const costoAziendaleAnnuo = p => Math.round((p?.costoMensile ?? 0) * 12);
const impatto2026Persona = p => {
  const mesiAttivi = MESI_2026.filter(m => !p?.meseInizio || m.key >= p.meseInizio).length;
  return Math.round((p?.costoMensile ?? 0) * mesiAttivi);
};
const impattoNetto2026Persona = p => {
  const mesiAttivi = MESI_2026.filter(m => !p?.meseInizio || m.key >= p.meseInizio).length;
  return Math.round(((p?.costoMensile ?? 0) - (p?.oldCosto ?? 0)) * mesiAttivi);
};

function calcActuals(fatture) {
  // Ritorna { mese: { catId: totale } }
  const result = {};
  fatture.forEach(f => {
    if (!result[f.data]) result[f.data] = {};
    result[f.data][f.catId] = (result[f.data][f.catId]||0) + f.importo;
  });
  return result;
}

function buildPiano(fatture) {
  const actuals = calcActuals(fatture);
  const piano = {};
  MESI_2026.forEach(({ key, locked }) => {
    piano[key] = {};
    CATEGORIE.forEach(cat => {
      const actual = actuals[key]?.[cat.id] ?? 0;
      piano[key][cat.id] = {
        forecast: locked ? actual : sugg(cat),
        actual: actual,
        locked,
      };
    });
  });
  return piano;
}

function pianoForecastTot(piano) {
  return MESI_2026.reduce((s, m) =>
    s + CATEGORIE.reduce((r, c) => r + (piano[m.key]?.[c.id]?.forecast ?? 0), 0), 0);
}
function pianoActualTot(piano) {
  return MESI_2026.reduce((s, m) =>
    s + CATEGORIE.reduce((r, c) => r + (piano[m.key]?.[c.id]?.actual ?? 0), 0), 0);
}
function meseForecastTot(piano, mKey) {
  return CATEGORIE.reduce((s, c) => s + (piano[mKey]?.[c.id]?.forecast ?? 0), 0);
}
function meseActualTot(piano, mKey) {
  return CATEGORIE.reduce((s, c) => s + (piano[mKey]?.[c.id]?.actual ?? 0), 0);
}
function catForecastTot(piano, catId) {
  return MESI_2026.reduce((s, m) => s + (piano[m.key]?.[catId]?.forecast ?? 0), 0);
}

};

function FormFattura({ fatture, onAdd, onClose }) {
  // Suggerisci prossimo numero MTV
  const lastMTV = useMemo(() => {
    const nums = fatture
      .map(f => parseInt(f.num.replace("MTV","").replace(/\D/g,"")))
      .filter(n => !isNaN(n) && n > 1000 && n < 9999);
    return nums.length ? Math.max(...nums) : 1908;
  }, [fatture]);

  const [form, setForm] = useState({
    num:     String(lastMTV + 1) + "MTV",
    beneficiario: "",
    importo: "",
    catId:   "staff",
    data:    "2026-04",
    note:    "",
  });
  const [err, setErr] = useState("");

  function set(k, v) { setForm(p => ({ ...p, [k]: v })); setErr(""); }

  function submit(e) {
    e.preventDefault();
    if (!form.beneficiario.trim()) { setErr("Inserisci il nome del beneficiario"); return; }
    const imp = parseFloat(form.importo.replace(/\./g,"").replace(",","."));
    if (!imp || imp <= 0) { setErr("Importo non valido"); return; }
    const newFattura = {
      id: Date.now(),
      num: form.num.trim(),
      data: form.data,
      importo: Math.round(imp),
      beneficiario: form.beneficiario.trim(),
      catId: form.catId,
      desc: `Invoice ${form.num.trim()} - ${form.beneficiario.trim()}${form.note ? " | "+form.note : ""}`,
      storico: false,
    };
    onAdd(newFattura);
    onClose();
  }

  return (
    <div className="fixed inset-0 z-50 flex items-center justify-center bg-black/40">
      <div className="bg-white rounded-2xl shadow-2xl w-full max-w-lg mx-4 overflow-hidden">
        <div className="bg-gradient-to-r from-indigo-700 to-indigo-900 px-6 py-4 flex justify-between items-center">
          <h2 className="text-white font-bold text-lg">➕ Inserisci Fattura</h2>
          <button onClick={onClose} className="text-indigo-200 hover:text-white text-2xl leading-none">×</button>
        </div>
        <form onSubmit={submit} className="p-6 space-y-4">
          {/* Numero Invoice */}
          <div className="grid grid-cols-2 gap-3">
            <div>
              <label className="block text-xs font-semibold text-gray-500 mb-1">N° Invoice</label>
              <input value={form.num} onChange={e => set("num", e.target.value)}
                className="w-full border border-gray-200 rounded-lg px-3 py-2 text-sm font-mono focus:outline-none focus:ring-2 focus:ring-indigo-300"
                placeholder="1909MTV" />
            </div>
            <div>
              <label className="block text-xs font-semibold text-gray-500 mb-1">Mese</label>
              <select value={form.data} onChange={e => set("data", e.target.value)}
                className="w-full border border-gray-200 rounded-lg px-3 py-2 text-sm focus:outline-none focus:ring-2 focus:ring-indigo-300">
                {MESI_LABEL.map(m => <option key={m.key} value={m.key}>{m.label}</option>)}
              </select>
            </div>
          </div>
          {/* Beneficiario */}
          <div>
            <label className="block text-xs font-semibold text-gray-500 mb-1">Beneficiario / Nome</label>
            <input value={form.beneficiario} onChange={e => set("beneficiario", e.target.value)}
              className="w-full border border-gray-200 rounded-lg px-3 py-2 text-sm focus:outline-none focus:ring-2 focus:ring-indigo-300"
              placeholder="es. Simone Solario, NVP, DGE..." autoFocus />
          </div>
          {/* Importo + Categoria */}
          <div className="grid grid-cols-2 gap-3">
            <div>
              <label className="block text-xs font-semibold text-gray-500 mb-1">Importo (imponibile €)</label>
              <input value={form.importo} onChange={e => set("importo", e.target.value)}
                className="w-full border border-gray-200 rounded-lg px-3 py-2 text-sm focus:outline-none focus:ring-2 focus:ring-indigo-300"
                placeholder="es. 1.600" />
            </div>
            <div>
              <label className="block text-xs font-semibold text-gray-500 mb-1">Categoria</label>
              <select value={form.catId} onChange={e => set("catId", e.target.value)}
                className="w-full border border-gray-200 rounded-lg px-3 py-2 text-sm focus:outline-none focus:ring-2 focus:ring-indigo-300">
                {CATEGORIE.map(c => <option key={c.id} value={c.id}>{c.nome}</option>)}
              </select>
            </div>
          </div>
          {/* Note */}
          <div>
            <label className="block text-xs font-semibold text-gray-500 mb-1">Note (opzionale)</label>

              placeholder="es. ritenuta, acconto, DGE_1..." />
          </div>
          {/* Preview descrizione */}
          {form.beneficiario && (
            <div className="bg-indigo-50 rounded-lg px-3 py-2 text-xs text-indigo-700 font-mono">
              Invoice {form.num} - {form.beneficiario}{form.note ? " | "+form.note : ""}
            </div>
          )}
          {err && <p className="text-red-500 text-xs font-medium">{err}</p>}
          <div className="flex gap-2 pt-1">
            <button type="button" onClick={onClose}
              className="flex-1 border border-gray-200 text-gray-600 text-sm px-3 py-2 rounded-lg hover:bg-gray-50 transition">

              ✓ Aggiungi Fattura
            </button>
          </div>
        </form>
      </div>
    </div>
  );

              <div className="h-1.5 rounded-full bg-indigo-400" style={{width:`${pctFore}%`}}/>
            </div>
          </div>

          {/* Margine */}
          <div className={`col-span-1 rounded-2xl p-4 border ${over ? "bg-red-500/20 border-red-400/30" : margine < 100000 ? "bg-amber-500/20 border-amber-400/30" : "bg-white/5 border-white/10"}`}>
            <div className="flex items-center gap-2 mb-2">
              <span className={`w-2.5 h-2.5 rounded-full flex-shrink-0 ${over?"bg-red-400":margine<100000?"bg-amber-400":"bg-gray-400"}`}/>
              <p className={`text-xs font-semibold uppercase tracking-wider ${over?"text-red-300":margine<100000?"text-amber-300":"text-gray-400"}`}>
                {over ? "⚠️ Sforamento" : "Margine libero"}
              </p>
            </div>
            <p className={`text-3xl font-bold ${over?"text-red-300":margine<100000?"text-amber-300":"text-white"}`}>
              {fmt(Math.abs(margine))}
            </p>
            <p className="text-xs text-white/30 mt-1">
              Budget totale: {fmt(BUDGET_TOTALE)}
            </p>
            <div className="mt-2 bg-white/10 rounded-full h-1.5">
              <div className={`h-1.5 rounded-full ${over?"bg-red-400":"bg-white/40"}`}
                   style={{width:`${Math.min((Math.abs(margine)/BUDGET_TOTALE)*100,100)}%`}}/>
            </div>
          </div>
        </div>

        {/* Barra composita Effettivo | Forecast | Libero */}
        <div>
          <div className="flex rounded-full overflow-hidden h-3 bg-white/10 gap-0.5">
            <div title={`Effettivo: ${fmt(effettivo)}`}
                 className="h-full bg-emerald-400 transition-all duration-500"
                 style={{width:`${pctEff}%`}}/>
            <div title={`Forecast: ${fmt(forecastResiduo)}`}
                 className="h-full bg-indigo-400 transition-all duration-500"
                 style={{width:`${pctFore}%`}}/>
          </div>
          <div className="flex justify-between items-center mt-1.5 text-[10px]">
            <span className="flex items-center gap-1 text-emerald-400">
              <span className="w-2 h-2 rounded-sm bg-emerald-400 inline-block"/> Effettivo {fmt(effettivo)}
            </span>
            <span className="flex items-center gap-1 text-indigo-300">
              <span className="w-2 h-2 rounded-sm bg-indigo-400 inline-block"/> Forecast {fmt(forecastResiduo)}
            </span>
            <span className="text-white/30">Budget totale {fmt(BUDGET_TOTALE)}</span>
          </div>
        </div>
      </div>
    </div>
  );
}

// ─── TAB: PIANO MENSILE ───────────────────────────────────────────────────────
function TabPiano({ piano, setPiano }) {
  const cats = CATEGORIE;

  function handleForecast(mKey, catId, val) {
    const num = parseInt(String(val).replace(/\D/g,""))||0;
    const cell = piano[mKey]?.[catId] ?? {};
    const delta = num - (cell.forecast??0);
    if (pianoForecastTot(piano) + delta > BUDGET_TOTALE + 500) return;
    setPiano(prev => ({
      ...prev,
      [mKey]: { ...prev[mKey], [catId]: { ...prev[mKey][catId], forecast: num } }
    }));
  }

  const totEffettivo = pianoActualTot(piano);
  const totForecast  = pianoForecastTot(piano) - totEffettivo;
  const margine      = BUDGET_TOTALE - pianoForecastTot(piano);

  return (
    <div>
      {/* ── Riepilogo Effettivo vs Forecast ───────────────────────────── */}
      <div className="grid grid-cols-3 gap-3 mb-4">
        <div className="bg-emerald-50 border border-emerald-200 rounded-xl p-3 flex items-center gap-3">
          <div className="w-9 h-9 rounded-lg bg-emerald-500 flex items-center justify-center text-white text-base flex-shrink-0">✓</div>
          <div>
            <p className="text-[10px] font-semibold text-emerald-600 uppercase tracking-wider">Effettivo (Gen–Mar)</p>
            <p className="text-lg font-bold text-emerald-700">{fmt(totEffettivo)}</p>
            <p className="text-[10px] text-emerald-500">{((totEffettivo/BUDGET_TOTALE)*100).toFixed(1)}% del budget</p>
          </div>
        </div>
        <div className="bg-indigo-50 border border-indigo-200 rounded-xl p-3 flex items-center gap-3">
          <div className="w-9 h-9 rounded-lg bg-indigo-500 flex items-center justify-center text-white text-base flex-shrink-0">≈</div>
          <div>
            <p className="text-[10px] font-semibold text-indigo-600 uppercase tracking-wider">Forecast (Apr–Dic)</p>
            <p className="text-lg font-bold text-indigo-700">{fmt(totForecast)}</p>
            <p className="text-[10px] text-indigo-500">{((totForecast/BUDGET_TOTALE)*100).toFixed(1)}% del budget</p>
          </div>
        </div>
        <div className={`border rounded-xl p-3 flex items-center gap-3 ${margine<0?"bg-red-50 border-red-200":margine<100000?"bg-amber-50 border-amber-200":"bg-gray-50 border-gray-200"}`}>
          <div className={`w-9 h-9 rounded-lg flex items-center justify-center text-white text-base flex-shrink-0 ${margine<0?"bg-red-500":margine<100000?"bg-amber-500":"bg-gray-400"}`}>
            {margine<0?"!":"↔"}
          </div>
          <div>
            <p className={`text-[10px] font-semibold uppercase tracking-wider ${margine<0?"text-red-600":margine<100000?"text-amber-600":"text-gray-500"}`}>
              {margine<0?"Sforamento":"Margine libero"}
            </p>
            <p className={`text-lg font-bold ${margine<0?"text-red-700":margine<100000?"text-amber-700":"text-gray-700"}`}>{fmt(Math.abs(margine))}</p>
            <p className={`text-[10px] ${margine<0?"text-red-400":margine<100000?"text-amber-400":"text-gray-400"}`}>su {fmt(BUDGET_TOTALE)}</p>
          </div>
        </div>
      </div>

      {/* ── Cards mensili ─────────────────────────────────────────────── */}
      <div className="flex gap-1.5 mb-4 overflow-x-auto pb-1">
        {MESI_2026.map(m => {
          const forecast = meseForecastTot(piano, m.key);
          const actual   = meseActualTot(piano, m.key);
          const hasAct   = actual > 0 && !m.locked;
          const overAct  = hasAct && actual > forecast;           // effettivo supera forecast
          const overBudg = forecast > BUDGET_TOTALE / 12 * 1.15; // forecast sopra soglia mensile
          const pctBar   = m.locked
            ? Math.min((actual / (BUDGET_TOTALE / 12)) * 100, 100)
            : Math.min((forecast / (BUDGET_TOTALE / 12)) * 100, 100);
          const delta    = overAct ? actual - forecast : 0;

          return (
            <div key={m.key} className={`flex-shrink-0 w-[78px] rounded-xl px-2 py-2 text-center border-2 transition
              ${m.locked
                ? "bg-emerald-50 border-emerald-300"
                : overAct
                  ? "bg-red-50 border-red-400 shadow-md shadow-red-100"
                  : overBudg
                  ? "bg-amber-50 border-amber-300"
                  : "bg-indigo-50 border-indigo-200"}`}>

              {/* Badge tipo mese */}
              <div className={`text-[8px] font-black uppercase tracking-wider mb-0.5
                ${m.locked?"text-emerald-500":overAct?"text-red-500":overBudg?"text-amber-500":"text-indigo-400"}`}>
                {m.locked ? "✓ REALE" : overAct ? "⚠ SFORATO" : "FORECAST"}
              </div>

              {/* Valore principale */}
              <div className={`text-sm font-black leading-tight
                ${m.locked?"text-emerald-700":overAct?"text-red-700":overBudg?"text-amber-700":"text-indigo-700"}`}>
                {m.locked ? fmtK(actual) : overAct ? fmtK(actual) : fmtK(forecast)}
              </div>

              {/* Nome mese */}
              <div className={`text-[10px] font-bold
                ${m.locked?"text-emerald-500":overAct?"text-red-400":"text-indigo-400"}`}>
                {MESE_LABEL_COMPLETO[m.key] || m.label}
              </div>

              {/* Delta sforamento */}
              {overAct && (
                <div className="mt-0.5 bg-red-200 text-red-700 rounded px-1 text-[8px] font-black">
                  +{fmtK(delta)} over
                </div>
              )}
              {/* Forecast vs reale (futuro con dati) */}
              {hasAct && !overAct && (
                <div className="text-[8px] text-emerald-600 font-semibold mt-0.5">
                  eff {fmtK(actual)}
                </div>
              )}

              {/* Mini barra di utilizzo */}
              <div className="mt-1.5 bg-white/60 rounded-full h-1 overflow-hidden">
                <div className={`h-1 rounded-full transition-all
                  ${m.locked?"bg-emerald-400":overAct?"bg-red-500":overBudg?"bg-amber-400":"bg-indigo-400"}`}
                  style={{width:`${pctBar}%`}}/>
              </div>
              <div className={`text-[7px] mt-0.5 ${overAct?"text-red-400":m.locked?"text-emerald-400":"text-indigo-300"}`}>
                {pctBar.toFixed(0)}% media
              </div>
            </div>
          );
        })}
      </div>


      {/* ── Griglia ───────────────────────────────────────────────────── */}
      <div className="overflow-x-auto rounded-xl border border-gray-200 shadow-sm">
        <table className="text-xs w-full border-collapse">
          <thead>
            {/* Riga 1: separatore EFFETTIVO / FORECAST */}
            <tr>
              <th className="sticky left-0 z-10 bg-white border-b border-gray-200" colSpan={2}/>
              {/* Effettivo: 3 celle verdi */}
              <th colSpan={3}
                  className="bg-emerald-500 text-white text-[10px] font-bold uppercase tracking-wider text-center py-1.5 border-b border-emerald-600">
                ✓ Effettivo — Gen / Feb / Mar
              </th>
              {/* Forecast: 9 celle blu */}
              <th colSpan={7}
                  className="bg-indigo-500 text-white text-[10px] font-bold uppercase tracking-wider text-center py-1.5 border-b border-indigo-600">
                ≈ Forecast — Apr → Dic (modificabile)
              </th>
              <th colSpan={2} className="bg-gray-100 border-b border-gray-200"/>
            </tr>
            {/* Riga 2: nomi mesi */}
            <tr className="border-b border-gray-200">
              <th className="text-left px-3 py-2 font-semibold text-gray-600 w-44 sticky left-0 bg-white z-10">Categoria</th>
              <th className="text-right px-2 py-2 text-gray-400 bg-white">Budget</th>
              {MESI_2026.map(m => (
                <th key={m.key}
                    className={`text-center px-1 py-2 w-[72px] font-semibold
                      ${m.locked ? "bg-emerald-50 text-emerald-700" : "bg-indigo-50 text-indigo-600"}`}>
                  {MESE_LABEL_COMPLETO[m.key] || m.label}
                </th>
              ))}
              <th className="text-right px-2 py-2 bg-gray-50 text-gray-500 font-semibold">Totale prev.</th>
              <th className="text-right px-2 py-2 bg-gray-50 text-gray-400 font-semibold">vs Budget</th>
            </tr>
          </thead>
          <tbody>
            {cats.map((cat, idx) => {
              const rowTot  = catForecastTot(piano, cat.id);
              const diff    = rowTot - cat.budget;
              const rowOver = diff > 0;
              // Conta celle in sforamento per questa riga
              const nOverCells = MESI_2026.filter(m => {
                const cell = piano[m.key]?.[cat.id] ?? {};
                return !m.locked && cell.actual > 0 && cell.actual > cell.forecast;
              }).length;

              return (
                <tr key={cat.id}
                    className={`border-b border-gray-100 hover:bg-yellow-50/20
                      ${rowOver ? "bg-red-50/30" : idx%2===0 ? "" : "bg-gray-50/20"}`}>

                  {/* Nome categoria — con badge alert se ci sono sforamenti */}
                  <td className={`px-3 py-1.5 font-medium sticky left-0 z-10
                    ${rowOver ? "bg-red-50 text-red-800" : "bg-white text-gray-700"}`}>
                    <div className="flex items-center gap-1.5">
                      <span className="inline-block w-2 h-2 rounded-full flex-shrink-0" style={{background:cat.colore}}/>
                      <span className="truncate">{cat.nome}</span>
                      {nOverCells > 0 && (
                        <span className="ml-auto bg-red-500 text-white text-[8px] font-black px-1 py-0.5 rounded-full leading-none flex-shrink-0">
                          ⚠{nOverCells}
                        </span>
                      )}
                    </div>
                  </td>

                  {/* Budget annuo */}
                  <td className="px-2 py-1.5 text-right text-gray-400 bg-white text-[11px]">{fmtK(cat.budget)}</td>

                  {/* Celle mensili */}
                  {MESI_2026.map(m => {
                    const cell      = piano[m.key]?.[cat.id] ?? { forecast:0, actual:0 };
                    const hasActual = cell.actual > 0 && !m.locked;
                    const overCell  = hasActual && cell.actual > cell.forecast;
                    const deltaCell = overCell ? cell.actual - cell.forecast : 0;

                    return (
                      <td key={m.key}
                          className={`px-1 py-1 text-center
                            ${m.locked
                              ? "bg-emerald-50/60"
                              : overCell
                              ? "bg-red-100 border-l border-r border-red-200"
                              : "bg-indigo-50/30"}`}>

                        {m.locked ? (
                          /* ── EFFETTIVO bloccato (verde) ── */
                          <div className="text-emerald-700 font-semibold text-[11px]">
                            {cell.actual > 0 ? fmtK(cell.actual) : <span className="text-gray-200">—</span>}
                          </div>
                        ) : overCell ? (
                          /* ── SFORAMENTO: effettivo > forecast ── */
                          <div className="space-y-0.5">
                            {/* Forecast barrato */}
                            <div className="text-[9px] text-red-300 line-through leading-none">
                              {fmtK(cell.forecast)}
                            </div>
                            {/* Effettivo in rosso grassetto */}
                            <div className="text-red-700 font-black text-[11px] leading-none">
                              {fmtK(cell.actual)}
                            </div>
                            {/* Delta */}
                            <div className="bg-red-500 text-white text-[8px] font-black rounded px-0.5 leading-tight">
                              +{fmtK(deltaCell)}
                            </div>
                          </div>
                        ) : (
                          /* ── FORECAST normale (blu) ── */
                          <div>
                            <input type="text"
                              value={cell.forecast===0?"":cell.forecast.toLocaleString("it-IT")}
                              onChange={e => handleForecast(m.key, cat.id, e.target.value)}
                              className="w-full text-center border border-indigo-200 rounded px-0.5 py-0.5 focus:outline-none focus:border-indigo-500 focus:bg-white bg-transparent text-indigo-700 font-medium text-[11px]"
                            />
                            {hasActual && (
                              <div className="text-[8px] mt-0.5 font-bold text-emerald-600 leading-tight">
                                ✓ {fmtK(cell.actual)}
                              </div>
                            )}
                          </div>
                        )}
                      </td>
                    );
                  })}

                  {/* Totale annuo riga */}
                  <td className={`px-2 py-1.5 text-right font-bold bg-gray-50 text-[11px] ${rowOver?"text-red-700":"text-gray-800"}`}>
                    {fmt(rowTot)}
                  </td>

                  {/* vs Budget: badge colorato */}
                  <td className="px-2 py-1.5 text-right bg-gray-50">
                    {rowOver ? (
                      <span className="inline-flex items-center gap-0.5 bg-red-500 text-white font-black text-[9px] px-1.5 py-0.5 rounded-md">
                        ⚠ +{fmtK(diff)}
                      </span>
                    ) : (
                      <span className="text-emerald-600 font-semibold text-[11px]">{fmtK(diff)}</span>
                    )}
                  </td>
                </tr>
              );
            })}
          </tbody>
          <tfoot>
            {/* Riga effettivo mensile */}
            <tr className="border-t-2 border-gray-200 text-xs">
              <td className="px-3 py-1.5 font-bold text-emerald-700 sticky left-0 bg-emerald-50 z-10">✓ Effettivo</td>
              <td className="bg-emerald-50"/>
              {MESI_2026.map(m => {
                const a = meseActualTot(piano, m.key);
                return (
                  <td key={m.key}
                      className={`px-1 py-1.5 text-center font-bold
                        ${m.locked ? "bg-emerald-100 text-emerald-700" : a > 0 ? "bg-emerald-50 text-emerald-600" : "bg-emerald-50/30 text-gray-200"}`}>
                    {a > 0 ? fmtK(a) : "—"}
                  </td>
                );
              })}
              <td className="px-2 py-1.5 text-right font-black text-emerald-700 bg-emerald-50">{fmt(pianoActualTot(piano))}</td>
              <td className="bg-emerald-50"/>
            </tr>

            {/* Riga forecast mensile */}
            <tr className="text-xs">
              <td className="px-3 py-1.5 font-bold text-indigo-700 sticky left-0 bg-indigo-50 z-10">≈ Forecast</td>
              <td className="bg-indigo-50 text-right text-indigo-300 px-2 text-[10px]">{fmtK(BUDGET_TOTALE)}</td>
              {MESI_2026.map(m => {
                const f   = meseForecastTot(piano, m.key);
                const a   = meseActualTot(piano, m.key);
                const ov  = !m.locked && a > f;
                return (
                  <td key={m.key}
                      className={`px-1 py-1.5 text-center font-bold
                        ${ov ? "bg-red-100 text-red-700" : m.locked ? "bg-indigo-50/40 text-indigo-300" : "bg-indigo-50 text-indigo-600"}`}>
                    {fmtK(f)}
                  </td>
                );
              })}
              <td className={`px-2 py-1.5 text-right font-black bg-indigo-50
                ${pianoForecastTot(piano) > BUDGET_TOTALE ? "text-red-700" : "text-indigo-800"}`}>
                {fmt(pianoForecastTot(piano))}
              </td>
              <td className={`px-2 py-1.5 text-right font-black bg-indigo-50
                ${margine < 0 ? "text-red-600" : "text-emerald-600"}`}>
                {margine < 0 && "⚠ "}{fmt(margine)}
              </td>
            </tr>

            {/* Riga delta (sforamento mensile) — appare solo se esiste almeno un mese over */}
            {MESI_2026.some(m => !m.locked && meseActualTot(piano, m.key) > meseForecastTot(piano, m.key)) && (
              <tr className="text-xs bg-red-50 border-t border-red-200">
                <td className="px-3 py-1.5 font-black text-red-700 sticky left-0 bg-red-50 z-10">⚠ Sforamento</td>
                <td className="bg-red-50"/>
                {MESI_2026.map(m => {
                  const f = meseForecastTot(piano, m.key);
                  const a = meseActualTot(piano, m.key);
                  const delta = !m.locked && a > f ? a - f : 0;
                  return (
                    <td key={m.key} className="px-1 py-1.5 text-center bg-red-50">
                      {delta > 0 ? (
                        <span className="bg-red-500 text-white font-black text-[8px] px-1 py-0.5 rounded">
                          +{fmtK(delta)}
                        </span>
                      ) : (
                        <span className="text-red-100">—</span>
                      )}
                    </td>
                  );
                })}
                <td className="bg-red-50"/>
                <td className="bg-red-50"/>
              </tr>
            )}
          </tfoot>
        </table>
      </div>

      {/* Legenda */}
      <div className="flex gap-5 mt-3 text-xs text-gray-400">
        <span className="flex items-center gap-1.5">
          <span className="w-3 h-3 rounded bg-emerald-100 border border-emerald-300 inline-block"/>
          <strong className="text-emerald-600">Verde</strong> = Effettivo (reale, bloccato)
        </span>
        <span className="flex items-center gap-1.5">
          <span className="w-3 h-3 rounded bg-indigo-100 border border-indigo-300 inline-block"/>
          <strong className="text-indigo-600">Blu</strong> = Forecast (modificabile)
        </span>
        <span className="flex items-center gap-1.5">
          <span className="w-3 h-3 rounded bg-red-100 border border-red-300 inline-block"/>
          <strong className="text-red-500">Rosso</strong> = Sforamento
        </span>
      </div>
    </div>
  );
}

// ─── TAB: FATTURE ─────────────────────────────────────────────────────────────
function TabFatture({ fatture, onDelete }) {
  const [filtroCat, setFiltroCat]   = useState("Tutte");
  const [filtroMese, setFiltroMese] = useState("Tutti");
  const [cerca, setCerca]           = useState("");
  const [soloNuove, setSoloNuove]   = useState(false);

  const mesiDisponibili = useMemo(() =>
    ["Tutti",...new Set(fatture.map(f=>f.data).sort())], [fatture]);
  const catsDisponibili = useMemo(() =>
    ["Tutte",...new Set(CATEGORIE.map(c=>c.nome))], []);

  const filtrate = useMemo(() => fatture.filter(f => {
    if (filtroCat!=="Tutte" && CAT_BY_ID[f.catId]?.nome !== filtroCat) return false;
    if (filtroMese!=="Tutti" && f.data !== filtroMese) return false;
    if (soloNuove && f.storico) return false;
    if (cerca) {
      const q = cerca.toLowerCase();
      if (!f.desc.toLowerCase().includes(q) && !f.beneficiario.toLowerCase().includes(q) && !f.num.toLowerCase().includes(q)) return false;
    }
    return true;
  }).sort((a,b) => b.data.localeCompare(a.data) || b.id - a.id), [fatture, filtroCat, filtroMese, cerca, soloNuove]);

  const totFiltrate = filtrate.reduce((s,f)=>s+f.importo,0);

  return (
    <div>
      {/* Toolbar */}
      <div className="flex flex-wrap gap-2 mb-4 items-center">
        <select value={filtroMese} onChange={e=>setFiltroMese(e.target.value)}
          className="border border-gray-200 rounded-lg px-2 py-1.5 text-sm focus:outline-none focus:border-indigo-400">
          {mesiDisponibili.map(m=><option key={m} value={m}>{m==="Tutti"?"Tutti i mesi":m}</option>)}
        </select>
        <select value={filtroCat} onChange={e=>setFiltroCat(e.target.value)}
          className="border border-gray-200 rounded-lg px-2 py-1.5 text-sm focus:outline-none focus:border-indigo-400">
          {catsDisponibili.map(c=><option key={c}>{c}</option>)}
        </select>
        <input value={cerca} onChange={e=>setCerca(e.target.value)} placeholder="🔍 Cerca invoice, beneficiario…"
          className="border border-gray-200 rounded-lg px-3 py-1.5 text-sm focus:outline-none focus:border-indigo-400 flex-1 min-w-40"/>
        <label className="flex items-center gap-1.5 text-sm text-gray-600 cursor-pointer">
          <input type="checkbox" checked={soloNuove} onChange={e=>setSoloNuove(e.target.checked)} className="accent-indigo-600"/>
          Solo nuove
        </label>
        <span className="ml-auto bg-indigo-50 text-indigo-700 border border-indigo-100 rounded-lg px-3 py-1.5 text-sm font-semibold">
          {filtrate.length} fatture · {fmt(totFiltrate)}
        </span>
      </div>

      <div className="bg-white rounded-xl border border-gray-200 shadow-sm overflow-hidden">
        <table className="w-full text-xs table-fixed">
          <thead className="bg-gray-50 border-b border-gray-200">
            <tr>
              <th className="text-left px-3 py-2 text-gray-500 font-semibold w-24">N° Invoice</th>
              <th className="text-left px-2 py-2 text-gray-500 font-semibold w-20">Mese</th>

// ─── TAB: DASHBOARD ───────────────────────────────────────────────────────────
function TabDashboard({ piano }) {
  const storico2025 = HISTORY_2025;
  const dati2026 = MESI_2026.map(m => ({
    key: m.key,
    label: m.label,
    short: m.short,
    tipo: m.locked ? "Effettivo" : "Forecast",
    valore: m.locked ? meseActualTot(piano, m.key) : meseForecastTot(piano, m.key),
    meseBudget: Math.round(BUDGET_TOTALE / 12),
  }));

  const maxTrend = Math.max(
    ...storico2025.map(h => h.totale),
    ...dati2026.map(d => d.valore),
    Math.round(BUDGET_TOTALE / 12)
  );

  const datiCategorie = CATEGORIE.map(cat => {
    const effettivo = MESI_2026.filter(m => m.locked).reduce((s,m) => s + (piano[m.key]?.[cat.id]?.actual ?? 0), 0);
    const forecast = MESI_2026.filter(m => !m.locked).reduce((s,m) => s + (piano[m.key]?.[cat.id]?.forecast ?? 0), 0);
    const totale = effettivo + forecast;
    return {
      ...cat,
      effettivo,
      forecast,
      totale,
      delta: totale - cat.budget,
      pct: cat.budget ? Math.min((totale / cat.budget) * 100, 140) : 0,
    };
  }).sort((a,b) => b.totale - a.totale);

  const totaleStorico2025 = storico2025.reduce((s,h)=>s+h.totale,0);
  const totale2026Forecast = pianoForecastTot(piano);
  const totale2026Actual = pianoActualTot(piano);
  const media2025 = Math.round(totaleStorico2025 / storico2025.length);
  const media2026 = Math.round(totale2026Forecast / 12);

  return (
    <div className="space-y-5">
      <div className="grid grid-cols-4 gap-3">
        <div className="bg-white rounded-xl border border-gray-200 p-4 shadow-sm">
          <p className="text-[11px] uppercase tracking-wider text-gray-400 font-semibold">Storico medio 2025</p>
          <p className="text-2xl font-bold text-gray-800 mt-1">{fmt(media2025)}</p>
          <p className="text-xs text-gray-400 mt-1">media mensile consuntiva</p>
        </div>
        <div className="bg-white rounded-xl border border-emerald-200 p-4 shadow-sm">
          <p className="text-[11px] uppercase tracking-wider text-emerald-500 font-semibold">Effettivo 2026</p>
          <p className="text-2xl font-bold text-emerald-700 mt-1">{fmt(totale2026Actual)}</p>
          <p className="text-xs text-emerald-500 mt-1">gennaio–marzo reali</p>
        </div>
        <div className="bg-white rounded-xl border border-indigo-200 p-4 shadow-sm">
          <p className="text-[11px] uppercase tracking-wider text-indigo-500 font-semibold">Forecast 2026</p>
          <p className="text-2xl font-bold text-indigo-700 mt-1">{fmt(totale2026Forecast)}</p>
          <p className="text-xs text-indigo-500 mt-1">totale planner annuo</p>
        </div>
        <div className={`bg-white rounded-xl border p-4 shadow-sm ${totale2026Forecast > BUDGET_TOTALE ? "border-red-200" : "border-amber-200"}`}>
          <p className={`text-[11px] uppercase tracking-wider font-semibold ${totale2026Forecast > BUDGET_TOTALE ? "text-red-500" : "text-amber-500"}`}>Vs budget 2026</p>
          <p className={`text-2xl font-bold mt-1 ${totale2026Forecast > BUDGET_TOTALE ? "text-red-700" : "text-amber-700"}`}>{fmt(totale2026Forecast - BUDGET_TOTALE)}</p>
          <p className="text-xs text-gray-400 mt-1">budget totale {fmt(BUDGET_TOTALE)}</p>
        </div>
      </div>

      <div className="bg-white rounded-xl border border-gray-200 p-5 shadow-sm">
        <div className="flex items-end justify-between mb-4">
          <div>
            <h2 className="font-bold text-gray-800">Trend mensile · 2025 vs 2026</h2>
            <p className="text-xs text-gray-400 mt-1">Grigio = storico 2025 · Verde = effettivo 2026 · Blu = forecast 2026 · linea tratteggiata = media budget mensile</p>
          </div>
          <div className="text-xs text-gray-400">Media budget: <span className="font-semibold text-indigo-500">{fmt(Math.round(BUDGET_TOTALE/12))}</span></div>
        </div>

        <div className="grid grid-cols-12 gap-2 items-end h-72">
          {storico2025.map((h, idx) => (
            <div key={h.key} className="flex flex-col items-center justify-end h-full">
              <div className="w-full flex items-end justify-center h-full relative">
                <div className="absolute w-full border-t border-dashed border-indigo-300" style={{bottom:`${(Math.round(BUDGET_TOTALE/12)/maxTrend)*100}%`}}/>

        </div>

          {dati2026.map((d) => (
            <div key={d.key} className="flex flex-col items-center justify-end h-full">
              <div className="w-full flex items-end justify-center h-full relative">
                <div className="absolute w-full border-t border-dashed border-indigo-300" style={{bottom:`${(d.meseBudget/maxTrend)*100}%`}}/>
                <div title={`${d.label}: ${fmt(d.valore)}`} className={`w-5/6 rounded-t-md ${d.tipo === "Effettivo" ? "bg-emerald-500" : "bg-indigo-500"}`} style={{height:`${(d.valore/maxTrend)*100}%`}}/>

          </div>
          <div className="text-xs text-gray-400">Media 2026: <span className="font-semibold text-gray-700">{fmt(media2026)}</span></div>
        </div>
        <div className="space-y-4">
          {datiCategorie.map(cat => (
            <div key={cat.id} className="border border-gray-100 rounded-xl p-4">
              <div className="flex items-center justify-between gap-4 mb-2">
                <div className="flex items-center gap-2 min-w-0">
                  <span className="w-3 h-3 rounded-full flex-shrink-0" style={{background:cat.colore}}/>
                  <div className="font-semibold text-gray-800 truncate">{cat.nome}</div>
                </div>
                <div className="text-right">
                  <div className="text-sm font-bold text-gray-800">{fmt(cat.totale)}</div>
                  <div className={`text-xs font-semibold ${cat.delta > 0 ? "text-red-600" : "text-emerald-600"}`}>{cat.delta > 0 ? `+${fmt(cat.delta)}` : fmt(cat.delta)} vs budget</div>
                </div>
              </div>
              <div className="relative h-5 bg-gray-100 rounded-full overflow-hidden">
                <div className="absolute inset-y-0 left-0 bg-gray-200" style={{width:'100%'}}/>
                <div className="absolute inset-y-0 left-0 bg-emerald-500" style={{width:`${Math.min((cat.effettivo/cat.budget)*100,100)}%`}}/>
                <div className="absolute inset-y-0 bg-indigo-500" style={{left:`${Math.min((cat.effettivo/cat.budget)*100,100)}%`, width:`${Math.min((cat.forecast/cat.budget)*100,100)}%`, opacity:0.85}}/>

                <div><span className="text-gray-400 block">Budget</span><span className="font-semibold text-gray-700">{fmt(cat.budget)}</span></div>
                <div><span className="text-emerald-500 block">Effettivo</span><span className="font-semibold text-emerald-700">{fmt(cat.effettivo)}</span></div>
                <div><span className="text-indigo-500 block">Forecast</span><span className="font-semibold text-indigo-700">{fmt(cat.forecast)}</span></div>
                <div><span className="text-gray-400 block">Copertura</span><span className={`font-semibold ${cat.pct > 100 ? "text-red-600" : "text-gray-700"}`}>{cat.pct.toFixed(0)}%</span></div>
              </div>
            </div>
          ))}
        </div>
      </div>
    </div>
  );
}

function FormContratto({ onAdd, onClose, initialData, mode }) {
  // mode: "proposta" | "simulazione" (default)
  // initialData: proposta object to edit (optional)
  const isEdit    = !!initialData;
  const isProposta = mode === "proposta" || (isEdit && (initialData?.status === "proposta" || initialData?.status === "simulato"));

  const [form, setForm] = useState(() => {
    if (initialData) {
      return {
        nome:        initialData.nome || "",
        tipo:        initialData.ral > 0 ? "dipendente" : "freelance",
        ral:         initialData.ral > 0 ? String(initialData.ral) : "",
        costoMensile:initialData.ral > 0 ? "" : String(initialData.costoMensile || ""),
        catId:       initialData.catId || "dipendenti",
        meseInizio:  initialData.meseInizio || "",
        oldCatId:    initialData.oldCatId || "",
        oldCosto:    initialData.oldCosto ? String(initialData.oldCosto) : "",
        note:        initialData.note || "",
      };
    }
    return {
      nome:"", tipo:"dipendente", ral:"", costoMensile:"",
      catId:"dipendenti", meseInizio:"2026-04",
      oldCatId:"", oldCosto:"", note:"",
    };
  });
  const [err, setErr] = useState("");
  function setF(k, v) { setForm(p => ({ ...p, [k]: v })); setErr(""); }

  const ralNum = useMemo(() => {
    const r = parseFloat((form.ral || "").replace(/\./g,"").replace(",","."));
    return isNaN(r) ? 0 : r;
  }, [form.ral]);

  // Dettaglio contributi (base empirica dal dataset ComoTV = ×1.50)
  // RAL qui = retribuzione base senza 13a
  // 13a mensilità:  RAL × 8.33%
  // INPS azienda:   lordo × ~30.72%  (INPGI/INPS giornalisti)
  // INAIL:          lordo × ~1.50%
  // TFR:            lordo × 6.91%
  // → totale contributi ≈ 39.13% su lordo, lordo = RAL × 1.0833

    const totAnno    = lordo + inps + inail + tfr;
    const mensile    = Math.round(totAnno / 12);
    return { lordo, inps, inail, tfr, totAnno, mensile };

// Stima netto mensile (IRPEF 2026 semplificata + INPS dipendente 9.19%)
function stimaNetto(ral) {
  if (!ral || ral <= 0) return 0;
  const inpsDip    = Math.round(Math.min(ral, 105000) * 0.0919 + Math.max(0, ral - 105000) * 0.01);
  const imponibile = ral - inpsDip;
  let irpef = 0;
  if (imponibile > 0)     irpef += Math.min(imponibile, 15000)  * 0.23;
  if (imponibile > 15000) irpef += Math.min(imponibile - 15000, 13000) * 0.25;
  if (imponibile > 28000) irpef += Math.min(imponibile - 28000, 22000) * 0.35;
  if (imponibile > 50000) irpef += (imponibile - 50000) * 0.43;
  // Detrazione lavoro dipendente
  let det = 0;
  if (imponibile <= 15000)      det = 1955;
  else if (imponibile <= 28000) det = Math.round(1190 + 1910 * (28000 - imponibile) / 13000);
  else if (imponibile <= 50000) det = Math.round(1910 * (50000 - imponibile) / 22000);
  const netto = ral - inpsDip - Math.max(0, Math.round(irpef - det));
  return Math.round(netto / 12);
}

              </>}
            </tbody>
          </table>
        </div>
      </div>
      {showForm && (
        <FormContratto
          mode={formMode}
          initialData={editingProposta}
          onAdd={updated => {
            if ((editingProposta?.status || "") === "simulato" || formMode === "simulazione") {
              const targetId = updated.id;
              setSimulazioni(prev => {
                const exists = prev.some(s => s.id === targetId);
                if (exists) return prev.map(s => s.id === targetId ? { ...updated, status: "simulato", azione: updated.azione || "simulato" } : s);
                return [...prev, { ...updated, status: "simulato", azione: updated.azione || "simulato" }];
              });
              setEditingProposta(null);
              setShowForm(false);
            } else {
              saveProposta(updated);
            }
          }}
          onClose={() => { setShowForm(false); setEditingProposta(null); }}
        />
      )}

  );
}

function App() {
  const [fatture, setFatture]   = useState(FATTURE_INIZIALI);
  const [piano,   setPiano]     = useState(() => buildPiano(FATTURE_INIZIALI));
  const [tab,     setTab]       = useState("fatture");
  const [showForm,setShowForm]  = useState(false);

  function handleAddFattura(f) {
    const nuoveFatture = [...fatture, f];
    setFatture(nuoveFatture);
    setPiano(prev => {
      const cat  = f.catId;
      const mKey = f.data;
      const cell = prev[mKey]?.[cat] ?? { forecast:0, actual:0, locked:false };
      const newActual = (cell.actual||0) + f.importo;
      return {
        ...prev,
        [mKey]: {
          ...prev[mKey],
          [cat]: {
            ...cell,
            actual: newActual,
            // Mesi bloccati: il forecast coincide con l'effettivo per definizione
            // Mesi futuri: il forecast rimane invariato → se actual > forecast emerge lo sforamento
            forecast: cell.locked ? newActual : (cell.forecast || 0),
          }
        }
      };
    });
  }

  function handleDeleteFattura(id) {
    const f = fatture.find(x=>x.id===id);
    if (!f) return;
    const nuoveFatture = fatture.filter(x=>x.id!==id);
    setFatture(nuoveFatture);
    setPiano(prev => {
      const cell = prev[f.data]?.[f.catId] ?? { forecast:0, actual:0 };
      const newActual = Math.max(0, (cell.actual||0) - f.importo);
      return {
        ...prev,
        [f.data]: {
          ...prev[f.data],
          [f.catId]: { ...cell, actual: newActual }
        }
      };
    });
  }

  const TABS = [
    { key:"fatture",   label:"🧾 Fatture" },
    { key:"piano",     label:"📅 Piano Mensile" },
    { key:"dashboard", label:"📊 Dashboard" },
    { key:"contratti", label:"📝 Contratti" },
  ];

  return (
    <div className="min-h-screen bg-gray-50 font-sans">
      {showForm && (
        <FormFattura fatture={fatture} onAdd={handleAddFattura} onClose={()=>setShowForm(false)}/>
      )}
      <KpiHeader piano={piano} onNuovaFattura={()=>setShowForm(true)}/>
      <div className="max-w-6xl mx-auto px-4 mt-5 pb-10">
        <div className="flex gap-2 mb-5">
          {TABS.map(t=>(
            <button key={t.key} onClick={()=>setTab(t.key)}
              className={`px-4 py-2 rounded-lg text-sm font-medium transition ${tab===t.key?"bg-indigo-600 text-white shadow":"bg-white text-gray-600 hover:bg-gray-100 border border-gray-200"}`}>
              {t.label}
            </button>
          ))}
        </div>
        {tab==="fatture"   && <TabFatture   fatture={fatture} onDelete={handleDeleteFattura}/>}
        {tab==="piano"     && <TabPiano     piano={piano} setPiano={setPiano}/>}
        {tab==="dashboard" && <TabDashboard piano={piano}/>}
        {tab==="contratti" && <TabContratti piano={piano}/>}
      </div>
    </div>
  );
}
const root = ReactDOM.createRoot(document.getElementById('root'));
root.render(React.createElement(App));

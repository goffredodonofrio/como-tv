<!DOCTYPE html>
<html lang="it">
<head>
  <meta charset="utf-8"/>
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Como TV — Accesso richiesto</title>
  <style>
    @import url('https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700;800;900&display=swap');
    *{margin:0;padding:0;box-sizing:border-box;}
    body{
      font-family:'Inter','Helvetica Neue',sans-serif;
      background:#0d1a38;
      min-height:100vh;
      display:flex;
      align-items:center;
      justify-content:center;
      position:relative;
      overflow:hidden;
    }
    .bg-grid{
      position:absolute;inset:0;
      background-image:linear-gradient(rgba(255,255,255,0.025) 1px,transparent 1px),
                       linear-gradient(90deg,rgba(255,255,255,0.025) 1px,transparent 1px);
      background-size:56px 56px;
      pointer-events:none;
    }
    .bg-glow{
      position:absolute;top:-200px;right:-200px;
      width:700px;height:700px;border-radius:50%;
      background:radial-gradient(circle,rgba(184,150,46,0.1) 0%,transparent 65%);
      pointer-events:none;
    }
    .card{
      position:relative;z-index:1;
      background:rgba(255,255,255,0.03);
      border:1px solid rgba(255,255,255,0.08);
      border-radius:16px;
      padding:48px 52px;
      width:100%;
      max-width:440px;
      box-shadow:0 20px 60px rgba(0,0,0,0.4);
    }
    .logo{
      display:block;
      width:56px;
      margin:0 auto 28px;
    }
    .eyebrow{
      font-size:10px;font-weight:700;letter-spacing:4px;
      text-transform:uppercase;color:#d4a93a;
      text-align:center;margin-bottom:10px;
    }
    h1{
      font-size:22px;font-weight:900;color:white;
      text-align:center;letter-spacing:-0.5px;
      margin-bottom:6px;
    }
    .subtitle{
      font-size:13px;color:rgba(255,255,255,0.38);
      text-align:center;margin-bottom:36px;font-weight:300;
    }
    .bar{
      width:40px;height:2px;
      background:linear-gradient(90deg,#B8962E,#f0c84a);
      margin:0 auto 32px;
      border-radius:2px;
    }
    label{
      display:block;font-size:11px;font-weight:700;
      letter-spacing:1.5px;text-transform:uppercase;
      color:rgba(255,255,255,0.45);margin-bottom:8px;
    }
    input#staticrypt-password{
      width:100%;
      background:rgba(255,255,255,0.05);
      border:1px solid rgba(255,255,255,0.12);
      border-radius:8px;
      padding:13px 16px;
      font-size:14px;font-family:'Inter',sans-serif;
      color:white;
      outline:none;
      transition:border-color 0.15s;
      margin-bottom:20px;
    }
    input#staticrypt-password::placeholder{color:rgba(255,255,255,0.2);}
    input#staticrypt-password:focus{
      border-color:#B8962E;
      box-shadow:0 0 0 3px rgba(184,150,46,0.15);
    }
    .remember-row{
      display:flex;align-items:center;gap:8px;
      margin-bottom:24px;
    }
    .remember-row input{width:14px;height:14px;accent-color:#B8962E;}
    .remember-row label{
      font-size:12px;color:rgba(255,255,255,0.4);
      letter-spacing:0;text-transform:none;margin:0;
      font-weight:400;
    }
    button#staticrypt-decrypt-button{
      width:100%;
      background:linear-gradient(135deg,#152347 0%,#1e3260 100%);
      border:1px solid #B8962E;
      border-radius:8px;
      padding:14px;
      font-family:'Inter',sans-serif;
      font-size:12px;font-weight:700;
      letter-spacing:2px;text-transform:uppercase;
      color:#d4a93a;
      cursor:pointer;
      transition:background 0.15s,box-shadow 0.15s;
    }
    button#staticrypt-decrypt-button:hover{
      background:linear-gradient(135deg,#1e3260 0%,#2a4480 100%);
      box-shadow:0 4px 20px rgba(184,150,46,0.2);
    }
    .error-msg{
      margin-top:16px;text-align:center;
      font-size:12px;color:#f87171;
      display:none;
    }
    .footer-note{
      margin-top:32px;text-align:center;
      font-size:11px;color:rgba(255,255,255,0.18);
    }
  </style>
</head>

  const TAG    = "b4ecc1f786bff000d335fe0ee46e27f84257b64fbf74983ec8611c4514f50243";
  const ITER   = 100000;
  const LS_KEY = 'scp_' + SALT.slice(0, 8);

  function fromHex(h) {
    const b = new Uint8Array(h.length / 2);
    for (let i = 0; i < h.length; i += 2) b[i / 2] = parseInt(h.substr(i, 2), 16);
    return b;
  }
  function b64ToBytes(s) {
    const bin = atob(s);
    return Uint8Array.from(bin, c => c.charCodeAt(0));
  }
  function toHex(buf) {
    return Array.from(new Uint8Array(buf)).map(b => b.toString(16).padStart(2, '0')).join('');
  }
  async function hmacSha256(keyStr, msg) {
    const k = await crypto.subtle.importKey(
      'raw', new TextEncoder().encode(keyStr),
      {name: 'HMAC', hash: 'SHA-256'}, false, ['sign']
    );
    return toHex(await crypto.subtle.sign('HMAC', k, new TextEncoder().encode(msg)));
  }
  async function deriveKey(pwd) {
    const km = await crypto.subtle.importKey(
      'raw', new TextEncoder().encode(pwd), {name: 'PBKDF2'}, false, ['deriveBits']
    );
    return crypto.subtle.deriveBits(
      {name: 'PBKDF2', salt: fromHex(SALT), iterations: ITER, hash: 'SHA-256'}, km, 256
    );
  }
  async function tryDecrypt(pwd) {
    const bits   = await deriveKey(pwd);
    const keyHex = toHex(bits);
    const h1     = await hmacSha256(SALT, pwd);
    const h2     = await hmacSha256(keyHex, h1);
    if (h2 !== TAG) return null;
    const aesKey = await crypto.subtle.importKey('raw', bits, {name: 'AES-CBC'}, false, ['decrypt']);
    try {
      const plain = await crypto.subtle.decrypt({name: 'AES-CBC', iv: fromHex(IV)}, aesKey, b64ToBytes(ENC));
      return new TextDecoder().decode(plain);
    } catch (e) { return null; }
  }
  function showError(msg) {
    let el = document.getElementById('_scp_err');
    if (!el) {
      el = document.createElement('p');
      el.id = '_scp_err';
      el.style.cssText = 'margin-top:14px;text-align:center;font-size:13px;color:#f87171;';
      document.getElementById('staticrypt-decrypt-button').after(el);
    }
    el.textContent = msg;
  }
  document.addEventListener('DOMContentLoaded', async () => {
    // Try remembered password first
    const saved = localStorage.getItem(LS_KEY);
    if (saved) {
      const html = await tryDecrypt(saved);
      if (html) { document.open(); document.write(html); document.close(); return; }
      localStorage.removeItem(LS_KEY);
    }
    const btn = document.getElementById('staticrypt-decrypt-button');
    const inp = document.getElementById('staticrypt-password');
    async function login() {
      const pwd = inp.value.trim();
      if (!pwd) return;
      btn.disabled = true;
      btn.textContent = 'Verifica in corso…';
      try {
        const html = await tryDecrypt(pwd);
        if (!html) { showError('Password non corretta. Riprova.'); return; }
        if (document.getElementById('staticrypt-remember').checked)
          localStorage.setItem(LS_KEY, pwd);
        document.open(); document.write(html); document.close();
      } finally {
        btn.disabled = false;
        btn.textContent = 'Accedi →';
      }
    }
    btn.addEventListener('click', login);
    inp.addEventListener('keydown', e => { if (e.key === 'Enter') login(); });
  });
})();
</script>
